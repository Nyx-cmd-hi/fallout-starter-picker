<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fallout Pokémon Starter Picker</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

select, button {
  padding: 10px;
  margin: 10px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
}

button {
  cursor: pointer;
  background: #334155;
  color: white;
  transition: 0.2s;
}

button:hover {
  background: #475569;
}

#cards {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 20px;
}

.card {
  width: 150px;
  padding: 20px;
  border-radius: 16px;
  background: #1e293b;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(255,255,255,0.2);
}

.card h3 {
  margin: 0;
}

.fade-in {
  animation: fadeIn 0.5s ease-in;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}

#result {
  margin-top: 30px;
}

.mutated {
  color: #22c55e;
  font-weight: bold;
  animation: glow 1.5s infinite alternate;
}

@keyframes glow {
  from {text-shadow: 0 0 5px #22c55e;}
  to {text-shadow: 0 0 20px #22c55e;}
}

/* Faction Colors */
.vault { background: #1e3a8a; }
.waste { background: #3f6212; }
.mental { background: #581c87; }
.lavender { background: #4c1d95; }
.silph { background: #064e3b; }

</style>
</head>

<body>

<h1>☢️ Starter Picker</h1>

<select id="faction">
  <option>Wastelander</option>
  <option>Mental Legion</option>
  <option>Lavender Town</option>
  <option>Silph Cooperative</option>
  <option>Vault Dwellers</option>
</select>

<button onclick="generate()">Generate Starters</button>

<div id="cards"></div>
<div id="result"></div>

<script>
// ===== DATA =====
const factions = {
  "Wastelander": ["Stunky","Grimer","Wooper-Paldea","Goomy","Trubbish","Cubone","Gulpin","Zigzagoon-Galar","Rolycoly","Impidimp","Paras","Slugma","Grimer-Alola","Meowth","Purrloin"],
  "Mental Legion": ["Spoink","Drowzee","Natu","Baltoy","Elgyem","Abra","Mime Jr.","Smoochum","Ralts","Gothita","Beldum","Riolu","Solosis","Psyduck","Hoothoot"],
  "Lavender Town": ["Gastly","Misdreavus","Vulpix","Shuppet","Dreepy","Zorua-Hisui","Litwick","Yamask","Houndour","Greavard","Duskull","Honedge","Sandygast","Bramblin","Corsola-Galar"],
  "Silph Cooperative": ["Koffing","Porygon","Klink","Magnemite","Elekid","Rattata","Zubat","Ekans","Voltorb","Voltorb-Hisui","Machop","Sandshrew","Tinkatink","Magby","Ditto"],
  "Vault Dwellers": ["Bulbasaur","Squirtle","Charmander","Chikorita","Totodile","Cyndaquil","Treecko","Mudkip","Torchic","Turtwig","Piplup","Chimchar","Snivy","Oshawott","Tepig","Chespin","Froakie","Fennekin","Rowlet","Popplio","Litten","Grookey","Sobble","Scorbunny","Sprigatito","Quaxly","Fuecoco","Pikachu","Eevee"]
};

function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

function getClass(faction) {
  return {
    "Wastelander": "waste",
    "Mental Legion": "mental",
    "Lavender Town": "lavender",
    "Silph Cooperative": "silph",
    "Vault Dwellers": "vault"
  }[faction];
}

// ===== GENERATE =====
function generate() {
  const faction = document.getElementById("faction").value;
  const starters = shuffle([...factions[faction]]).slice(0, 3);

  const container = document.getElementById("cards");
  container.innerHTML = "";

  starters.forEach(p => {
    const div = document.createElement("div");
    div.className = `card fade-in ${getClass(faction)}`;
    div.innerHTML = `<h3>${p}</h3>`;
    div.onclick = () => selectStarter(p, faction);
    container.appendChild(div);
  });

  document.getElementById("result").innerHTML = "";
}

// ===== SELECT =====
function selectStarter(pokemon, faction) {
  const mutated = Math.random() < 0.01;

  const result = document.getElementById("result");

  result.innerHTML = `
    <h2>You chose ${pokemon}</h2>
    <p>${pokemon} looks at you cautiously… then stays.</p>
    ${mutated ? '<p class="mutated">☢️ Radioactive Mutation Detected!</p>' : ''}
  `;
}
</script>

</body>
</html>
