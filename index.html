<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pip-Boy Starter Picker</title>

<style>
body {
  margin: 0;
  background: #0b1f0b;
  color: #33ff33;
  font-family: "Courier New", monospace;
  text-align: center;
}

/* Scanline effect */
body::after {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    to bottom,
    rgba(0,255,0,0.05),
    rgba(0,255,0,0.05) 2px,
    transparent 2px,
    transparent 4px
  );
  pointer-events: none;
}

h1 {
  margin-top: 20px;
  text-shadow: 0 0 10px #33ff33;
}

select, button {
  background: black;
  color: #33ff33;
  border: 1px solid #33ff33;
  padding: 10px;
  margin: 10px;
  font-family: inherit;
  cursor: pointer;
}

button:hover {
  background: #113311;
}

/* Cards */
#cards {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 20px;
}

.card {
  width: 180px;
  border: 1px solid #33ff33;
  padding: 15px;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  background: #113311;
  transform: scale(1.05);
}

.card img {
  width: 96px;
  height: 96px;
  image-rendering: pixelated;
}

/* Result */
#result {
  margin-top: 30px;
}

.mutated {
  color: #66ff66;
  font-weight: bold;
  animation: glow 1.5s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 5px #33ff33; }
  to { text-shadow: 0 0 20px #66ff66; }
}
</style>
</head>

<body>

<h1>☢️ PIP-BOY STARTER SELECTOR</h1>

<select id="faction">
  <option>Wastelander</option>
  <option>Mental Legion</option>
  <option>Lavender Town</option>
  <option>Silph Cooperative</option>
  <option>Vault Dwellers</option>
</select>

<button onclick="generate()">SCAN FOR STARTERS</button>

<div id="cards"></div>
<div id="result"></div>

<script>
// ===== DATA =====
const factions = {
  "Wastelander": ["stunky","grimer","wooper-paldea","goomy","trubbish","cubone","gulpin","zigzagoon-galar","rolycoly","impidimp","paras","slugma","grimer-alola","meowth","purrloin"],
  "Mental Legion": ["spoink","drowzee","natu","baltoy","elgyem","abra","mime-jr","smoochum","ralts","gothita","beldum","riolu","solosis","psyduck","hoothoot"],
  "Lavender Town": ["gastly","misdreavus","vulpix","shuppet","dreepy","zorua-hisui","litwick","yamask","houndour","greavard","duskull","honedge","sandygast","bramblin","corsola-galar"],
  "Silph Cooperative": ["koffing","porygon","klink","magnemite","elekid","rattata","zubat","ekans","voltorb","voltorb-hisui","machop","sandshrew","tinkatink","magby","ditto"],
  "Vault Dwellers": ["bulbasaur","squirtle","charmander","chikorita","totodile","cyndaquil","treecko","mudkip","torchic","turtwig","piplup","chimchar","snivy","oshawott","tepig","chespin","froakie","fennekin","rowlet","popplio","litten","grookey","sobble","scorbunny","sprigatito","quaxly","fuecoco","pikachu","eevee"]
};

// ===== UTIL =====
function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

// ===== SPRITE URL =====
function getSprite(name) {
  const base = "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/";

  const map = {
    "wooper-paldea": "1009",
    "zigzagoon-galar": "263",
    "grimer-alola": "88",
    "zorua-hisui": "570",
    "corsola-galar": "222",
    "voltorb-hisui": "100",
  };

  if (map[name]) return base + map[name] + ".png";

  return base + name + ".png";
}

// ===== GENERATE =====
function generate() {
  const faction = document.getElementById("faction").value;
  const starters = shuffle([...factions[faction]]).slice(0, 3);

  const container = document.getElementById("cards");
  container.innerHTML = "";

  starters.forEach(p => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${getSprite(p)}">
      <h3>${p}</h3>
    `;

    div.onclick = () => selectStarter(p);

    container.appendChild(div);
  });

  document.getElementById("result").innerHTML = "";
}

// ===== SELECT =====
function selectStarter(pokemon) {
  const mutated = Math.random() < 0.01;

  document.getElementById("result").innerHTML = `
    <h2>SELECTED: ${pokemon.toUpperCase()}</h2>
    <p>Status: Bound to user</p>
    ${mutated ? '<p class="mutated">☢️ MUTATION DETECTED</p>' : ''}
  `;
}
</script>

</body>
</html>
